<!DOCTYPE html>
<html lang="ru">
<head>
    <meta charset="UTF-8">
    <meta name="viewport" content="width=device-width, initial-scale=1.0, maximum-scale=1.0, user-scalable=no, viewport-fit=cover">
    <title>Pudge Hook: Pixel Defense</title>
    <script src="https://cdnjs.cloudflare.com/ajax/libs/phaser/3.60.0/phaser.min.js"></script>
    <script src="https://telegram.org/js/telegram-web-app.js"></script>
    <style>
        body { margin: 0; padding: 0; background-color: #000; overflow: hidden; touch-action: none; image-rendering: pixelated; }
        canvas { display: block; margin: 0 auto; }
    </style>
</head>
<body>
<script>
const tg = window.Telegram.WebApp;
tg.expand();

// Настройки игры
const config = {
    type: Phaser.AUTO,
    scale: {
        mode: Phaser.Scale.FIT,
        autoCenter: Phaser.Scale.CENTER_BOTH,
        width: 720,
        height: 1280
    },
    physics: {
        default: 'arcade',
        arcade: { gravity: { y: 0 }, debug: false }
    },
    render: {
        pixelArt: true, // Включаем сглаживание для пиксель-арта
        antialias: false
    },
    scene: { preload, create, update }
};

const game = new Phaser.Game(config);

let player, enemies, hooks, particles, mapBg;
let joystickBase, joystickThumb, isJoystickActive = false;
let lv = 1, hp = 100, maxHp = 100;
let baseDmg = 25, attackSpeed = 1500;
let lastAttackTime = 0;

function preload() {
    // === ЗАГРУЗКА АССЕТОВ ===
    // ВАЖНО: Убедитесь, что у вас есть эти файлы в папке assets/
    
    // 1. Фон земли (пиксельная текстура грязи/травы)
    this.load.image('bg_ground', 'assets/ground_texture.png');
    
    // 2. Пудж (спрайт-лист для анимации, например 64x64 пикселя на кадр)
    // Предположим, 4 кадра на анимацию ходьбы
    this.load.spritesheet('pudge', 'assets/pudge_spritesheet.png', { frameWidth: 64, frameHeight: 64 });
    
    // 3. Крипы (спрайт-лист, например 48x48)
    this.load.spritesheet('creep', 'assets/creep_spritesheet.png', { frameWidth: 48, frameHeight: 48 });
    
    // 4. Крюк (изображение самого хука)
    this.load.image('hook_head', 'assets/hook_head.png');
    
    // 5. Частицы крови (маленький пиксель)
    this.load.image('blood_part', 'assets/blood_pixel.png');
}

function create() {
    // === СОЗДАНИЕ МИРА ===
    
    // Фон, который тайлится (повторяется) по всему экрану
    mapBg = this.add.tileSprite(0, 0, 720, 1280, 'bg_ground').setOrigin(0);
    
    // === СОЗДАНИЕ АНИМАЦИЙ ===
    
    // Анимация ходьбы Пуджа (вниз)
    this.anims.create({
        key: 'pudge_walk',
        frames: this.anims.generateFrameNumbers('pudge', { start: 0, end: 3 }),
        frameRate: 8,
        repeat: -1
    });

    // Анимация ходьбы Крипа
    this.anims.create({
        key: 'creep_walk',
        frames: this.anims.generateFrameNumbers('creep', { start: 0, end: 3 }),
        frameRate: 6,
        repeat: -1
    });

    // === СОЗДАНИЕ ОБЪЕКТОВ ===
    
    player = this.physics.add.sprite(360, 640, 'pudge').setScale(1.5); // Немного увеличим Пуджа
    player.setCollideWorldBounds(true);
    player.play('pudge_walk'); // Сразу запускаем анимацию

    enemies = this.physics.add.group();
    hooks = this.physics.add.group();
    
    // Частицы крови (на основе текстуры)
    particles = this.add.particles(0, 0, 'blood_part', {
        scale: { start: 1, end: 0 },
        speed: { min: 80, max: 200 },
        lifespan: 500,
        gravityY: 100, // Гравитация для крови
        blendMode: 'ADD',
        emitting: false
    });

    // UI и Управление (код остается прежним, он адаптивный)
    // ... (код из прошлого сообщения) ...
    // ВАЖНО: Я пропустил код джойстика и UI, чтобы не раздувать сообщение, 
    // но он должен быть здесь.

    // Столкновения
    this.physics.add.overlap(hooks, enemies, hitEnemy, null, this);
    this.physics.add.collider(player, enemies, (p, e) => {
        takeDamage(1);
        this.cameras.main.shake(100, 0.01);
    });

    // Спавн врагов
    this.time.addEvent({ delay: 2000, callback: spawnEnemy, callbackScope: this, loop: true });
}

function update(time, delta) {
    // Тайлинг фона создает иллюзию движения мира, если игрок стоит
    mapBg.tilePositionY += 0.5;

    if (time > lastAttackTime + attackSpeed) {
        shootHook.call(this);
        lastAttackTime = time;
    }

    enemies.getChildren().forEach(enemy => {
        this.physics.moveToObject(enemy, player, 100 + (lv * 5));
        
        // Поворачиваем крипа в сторону движения (отражение по горизонтали)
        if (enemy.body.velocity.x > 0) enemy.setFlipX(false);
        else enemy.setFlipX(true);
    });
}

function shootHook() {
    let target = enemies.getFirstAlive();
    if (!target) return;
    
    // Крюк теперь — это пиксельная голова хука
    let hook = hooks.create(player.x, player.y, 'hook_head').setScale(1.2);
    this.physics.moveToObject(hook, target, 1000); // Хук быстрее
    hook.setRotation(Phaser.Math.Angle.Between(player.x, player.y, target.x, target.y) + Math.PI/2);
}

function hitEnemy(hook, enemy) {
    hook.destroy();
    particles.emitParticleAt(enemy.x, enemy.y, 10);
    
    // Всплывающий урон (пиксельным шрифтом)
    let dmgText = this.add.text(enemy.x, enemy.y, `-${baseDmg}`, { fontSize: '28px', fill: '#ff0', fontFamily: 'Courier New' });
    this.tweens.add({ targets: dmgText, y: enemy.y - 60, alpha: 0, duration: 800, onComplete: () => dmgText.destroy() });

    enemy.destroy();
    // Логика опыта и уровня ... (как в прошлом сообщении) ...
}

function spawnEnemy() {
    let x = Math.random() > 0.5 ? 0 : 720;
    let y = Math.random() * 1280;
    let enemy = enemies.create(x, y, 'creep').setScale(1.2);
    enemy.play('creep_walk'); // Запускаем анимацию крипа
}

// ... Остальные функции takeDamage, levelUp и т.д. ...
</script>
</body>
</html>
