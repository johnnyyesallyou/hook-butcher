<!DOCTYPE html>
<html lang="ru">
<head>
    <meta charset="UTF-8" />
    <meta name="viewport" content="width=device-width, initial-scale=1.0, maximum-scale=1.0, user-scalable=no, viewport-fit=cover" />
    <meta name="apple-mobile-web-app-capable" content="yes" />
    <meta name="apple-mobile-web-app-status-bar-style" content="black-translucent" />
    <meta name="theme-color" content="#1a0000" />
    <title>🔪 Крюк Мясника: Telegram Edition</title>
    <script src="https://telegram.org/js/telegram-web-app.js"></script>
    <script src="https://cdn.jsdelivr.net/npm/phaser@3.55.2/dist/phaser.min.js"></script>
    <style>
        * {
            margin: 0;
            padding: 0;
            box-sizing: border-box;
            -webkit-user-select: none;
            user-select: none;
            -webkit-touch-callout: none;
        }

        html, body {
            width: 100%;
            height: 100%;
            overflow: hidden;
            background: #1a0000;
            font-family: 'Courier New', monospace;
        }

        #game {
            width: 100%;
            height: 100%;
            display: flex;
            align-items: center;
            justify-content: center;
            background: #1a0000;
        }

        canvas {
            display: block;
            max-width: 100vw;
            max-height: 100vh;
        }

        .loading {
            position: fixed;
            width: 100%;
            height: 100%;
            background: #1a0000;
            display: flex;
            align-items: center;
            justify-content: center;
            z-index: 9999;
            color: #fff;
            font-size: 24px;
            font-weight: bold;
        }

        .loading-spinner {
            border: 4px solid #333;
            border-top: 4px solid #ff0000;
            border-radius: 50%;
            width: 40px;
            height: 40px;
            animation: spin 1s linear infinite;
            margin-right: 15px;
        }

        @keyframes spin {
            0% { transform: rotate(0deg); }
            100% { transform: rotate(360deg); }
        }
    </style>
</head>
<body>
    <div id="game"></div>

    <script>
        // === TELEGRAM ИНИЦИАЛИЗАЦИЯ ===
        window.Telegram = window.Telegram?.WebApp || {
            ready: () => {},
            expand: () => {},
            CloudStorage: {
                setItem: () => {},
                getItem: () => Promise.resolve(null),
            },
            HapticFeedback: {
                impactOccurred: () => {},
                notificationOccurred: () => {},
            },
        };

        if (window.Telegram?.ready) window.Telegram.ready();
        if (window.Telegram?.expand) window.Telegram.expand();

        // === ЭФФЕКТЫ ===
        class EffectsSystem {
            constructor(scene) {
                this.scene = scene;
                this.createAudioContext();
            }

            createAudioContext() {
                if (!window.audioContext) {
                    try {
                        window.audioContext = new (window.AudioContext || window.webkitAudioContext)();
                    } catch (e) {
                        console.warn('AudioContext not available');
                    }
                }
            }

            spawnBloodParticles(x, y, intensity = 5) {
                for (let i = 0; i < intensity; i++) {
                    const particle = this.scene.add.graphics({x, y});
                    particle.fillStyle(0xff0000, 0.8);
                    const size = Phaser.Math.Between(3, 8);
                    particle.fillCircle(0, 0, size);

                    const vx = Phaser.Math.Between(-200, 200);
                    const vy = Phaser.Math.Between(-300, -100);

                    this.scene.tweens.add({
                        targets: particle,
                        x: x + vx,
                        y: y + vy,
                        alpha: 0,
                        duration: 600,
                        ease: 'Power2.out',
                        onComplete: () => particle.destroy(),
                    });
                }
            }

            triggerCritFlash(intensity = 0.3) {
                const flash = this.scene.add.rectangle(
                    this.scene.cameras.main.centerX,
                    this.scene.cameras.main.centerY,
                    this.scene.cameras.main.width,
                    this.scene.cameras.main.height,
                    0xff0000,
                    intensity
                );
                flash.setScrollFactor(0);
                flash.setDepth(999);

                this.scene.tweens.add({
                    targets: flash,
                    alpha: 0,
                    duration: 100,
                    onComplete: () => flash.destroy(),
                });
            }

            playCritSound(intensity = 1) {
                if (!window.audioContext) return;

                const ctx = window.audioContext;
                const now = ctx.currentTime;
                const duration = 0.1 * intensity;

                const osc = ctx.createOscillator();
                const gain = ctx.createGain();

                osc.type = 'square';
                osc.frequency.setValueAtTime(1200, now);
                osc.frequency.exponentialRampToValueAtTime(400, now + duration);

                gain.gain.setValueAtTime(0.3, now);
                gain.gain.exponentialRampToValueAtTime(0.01, now + duration);

                osc.connect(gain);
                gain.connect(ctx.destination);

                osc.start(now);
                osc.stop(now + duration);
            }

            spawnExpParticles(x, y, amount, stat) {
                const colors = {
                    strength: 0xff0000,
                    agility: 0x00ff00,
                    speed: 0xffff00,
                    vitality: 0x00ffff,
                };
                const color = colors[stat] || 0xffffff;

                for (let i = 0; i < 3; i++) {
                    const particle = this.scene.add.text(x, y, '+' + Math.floor(amount), {
                        fontSize: '18px',
                        color: `#${color.toString(16).padStart(6, '0')}`,
                        fontStyle: 'bold',
                    });

                    const angle = (Math.PI * 2 * i) / 3;
                    const vx = Math.cos(angle) * 150;
                    const vy = Math.sin(angle) * 150 - 50;

                    this.scene.tweens.add({
                        targets: particle,
                        x: x + vx,
                        y: y + vy,
                        alpha: 0,
                        duration: 800,
                        ease: 'Quad.out',
                        onComplete: () => particle.destroy(),
                    });
                }
            }

            floorTransitionEffect() {
                const overlay = this.scene.add.rectangle(
                    this.scene.cameras.main.centerX,
                    this.scene.cameras.main.centerY,
                    this.scene.cameras.main.width,
                    this.scene.cameras.main.height,
                    0x000000,
                    0
                );
                overlay.setScrollFactor(0);
                overlay.setDepth(998);

                this.scene.tweens.add({
                    targets: overlay,
                    alpha: 0.6,
                    duration: 200,
                    onComplete: () => {
                        this.scene.tweens.add({
                            targets: overlay,
                            alpha: 0,
                            duration: 300,
                            onComplete: () => overlay.destroy(),
                        });
                    },
                });
            }
        }

        // === ПРОГРЕССИЯ ===
        class ProgressionSystem {
            constructor() {
                this.legacyShards = 0;
                this.permanentStats = {strength: 0, agility: 0, speed: 0, vitality: 0};
                this.unlockedUpgrades = new Set();
                this.currentBuild = 'balanced';
            }

            save() {
                return {
                    legacyShards: this.legacyShards,
                    permanentStats: {...this.permanentStats},
                    unlockedUpgrades: Array.from(this.unlockedUpgrades),
                    currentBuild: this.currentBuild,
                };
            }

            load(data) {
                if (!data) return;
                this.legacyShards = data.legacyShards || 0;
                this.permanentStats = data.permanentStats || this.permanentStats;
                this.unlockedUpgrades = new Set(data.unlockedUpgrades || []);
                this.currentBuild = data.currentBuild || 'balanced';
            }
        }

        // === БОССЫ ===
        class BossSystem {
            isBossFloor(floor) {
                return floor % 10 === 0 && floor > 0;
            }

            createBoss(floor) {
                const bosses = [
                    {name: 'Повелитель Крови', maxHp: 300},
                    {name: 'Ржавый Титан', maxHp: 600},
                    {name: 'Королева Болот', maxHp: 1000},
                ];
                const boss = bosses[Math.floor(floor / 10) % 3];
                return {
                    name: boss.name,
                    maxHp: boss.maxHp * (1 + (Math.floor(floor / 10) - 1) * 0.4),
                    currentHp: boss.maxHp,
                    x: 360,
                    y: 200,
                };
            }
        }

        // === TELEGRAM ===
        class TelegramSystem {
            constructor() {
                this.tg = window.Telegram?.WebApp;
                this.userId = this.tg?.initDataUnsafe?.user?.id || 'user_' + Date.now();
                this.leaderboard = [];
            }

            updateLeaderboard(gameData) {
                const entry = {
                    userId: this.userId,
                    floor: gameData.floor,
                    shards: gameData.legacyShards,
                    timestamp: Date.now(),
                };

                this.leaderboard = this.leaderboard.filter(e => e.userId !== this.userId);
                this.leaderboard.push(entry);
                this.leaderboard.sort((a, b) => b.floor - a.floor || b.shards - a.shards);

                localStorage.setItem('leaderboard', JSON.stringify(this.leaderboard));
            }

            getPlayerRank() {
                const rank = this.leaderboard.findIndex(e => e.userId === this.userId);
                const percentile = Math.round(((this.leaderboard.length - rank) / this.leaderboard.length) * 100);
                return {rank: rank + 1, percentile, total: this.leaderboard.length};
            }

            triggerHaptic(type = 'medium') {
                if (!this.tg?.HapticFeedback) return;
                if (type === 'heavy') this.tg.HapticFeedback.impactOccurred?.('heavy');
            }
        }

        // === ОСНОВНАЯ СЦЕНА ===
        class GameScene extends Phaser.Scene {
            constructor() {
                super('GameScene');
            }

            async create() {
                this.effects = new EffectsSystem(this);
                this.progression = new ProgressionSystem();
                this.bossSystem = new BossSystem();
                this.telegram = new TelegramSystem();

                this.floor = 1;
                this.stats = {strength: 10, agility: 10, speed: 10, vitality: 10};
                this.playerHP = 100 + this.stats.vitality * 5;
                this.currentRunKills = 0;
                this.hookCooldown = 0;
                this.radius = 60 + this.stats.strength * 2.8 + this.floor * 1.5;
                this.critChance = 0.15;

                await this.loadGame();

                this.player = this.add.graphics({x: 360, y: 900});
                this.updateSkin();

                this.radiusCircle = this.add.graphics();
                this.updateRadius();

                this.cursors = this.input.keyboard.createCursorKeys();
                this.keys = this.input.keyboard.addKeys('W,A,S,D');

                this.mobs = this.physics.add.group();

                this.initializeMobTypes();
                this.spawnMobTimer = this.time.addEvent({
                    delay: 12000,
                    callback: this.spawnMob,
                    callbackScope: this,
                    loop: true,
                });
                this.spawnMob();

                this.ui = this.add.text(20, 20, '', {
                    fontSize: '20px',
                    color: '#fff',
                    fontFamily: 'monospace',
                }).setDepth(100);

                this.hpBar = this.add.graphics();

                this.time.addEvent({
                    delay: 30000,
                    callback: this.saveGame,
                    callbackScope: this,
                    loop: true,
                });

                this.updateBiomeBackground();
            }

            initializeMobTypes() {
                this.mobTypes = [
                    {id: 1, tint: 0xff0000, give: 'vitality', amt: 2, name: 'Кровосос'},
                    {id: 2, tint: 0x00ff00, give: 'speed', amt: 3, name: 'Трясун'},
                    {id: 3, tint: 0xff8800, give: 'strength', amt: 1, name: 'Мясной червь'},
                    {id: 4, tint: 0xaa5500, give: 'agility', amt: 3, name: 'Ржавый паук'},
                    {id: 5, tint: 0x555555, give: 'strength', amt: 4, name: 'Громила'},
                    {id: 6, tint: 0xffaa00, give: 'speed', amt: 2, name: 'Искроглот'},
                ];
            }

            updateBiomeBackground() {
                const biomeIndex = Math.floor((this.floor - 1) / 5);
                const biomes = [
                    {bg: '#3a0000'},
                    {bg: '#4a3a2a'},
                    {bg: '#2a4a2a'},
                    {bg: '#4a4a4a'},
                    {bg: '#3a4a5a'},
                ];
                const biome = biomes[Math.min(biomeIndex, biomes.length - 1)];
                this.cameras.main.setBackgroundColor(biome.bg);
            }

            updateSkin() {
                const skinIndex = Math.min(Math.floor((this.floor - 1) / 10), 5);
                const colors = [0xff0000, 0x888888, 0x00ff00, 0x00aaff, 0xaa00aa, 0xffdd00];
                this.player.clear();
                this.player.fillStyle(colors[skinIndex], 1);
                this.player.fillCircle(0, 0, 28);
            }

            updateRadius() {
                this.radius = 60 + this.stats.strength * 2.8 + this.floor * 1.5;
                this.radiusCircle.clear();
                const opacity = this.hookCooldown > 0 ? 0.3 : 0.65;
                const color = this.hookCooldown > 0 ? 0x666666 : 0xff0000;
                this.radiusCircle.lineStyle(5, color, opacity);
                this.radiusCircle.strokeCircle(this.player.x, this.player.y, this.radius);
            }

            spawnMob(x, y) {
                const biomeIndex = Math.floor((this.floor - 1) / 5);
                const startIdx = Math.max(0, biomeIndex * 3);
                const typeIndex = Phaser.Math.Between(startIdx, Math.min(startIdx + 3, this.mobTypes.length - 1));
                const type = this.mobTypes[typeIndex];

                const mobX = x !== undefined ? x : Phaser.Math.Between(80, 640);
                const mobY = y !== undefined ? y : Phaser.Math.Between(100, 500);

                const mob = this.add.graphics({x: mobX, y: mobY});
                mob.fillStyle(type.tint, 1);
                mob.fillCircle(0, 0, 18);

                const mobHP = 30 + this.floor * 8;
                mob.setData({type, hp: mobHP, maxHp: mobHP});

                const sprite = this.physics.add.existing(mob);
                this.mobs.add(sprite);

                const speed = 70 + this.floor * 2;
                this.physics.moveToObject(sprite, this.player, speed);
            }

            update(time, delta) {
                const spd = 220 + this.stats.speed * 1.5;
                if (this.keys.A.isDown || this.cursors.left.isDown) this.player.x -= spd * (delta / 1000);
                if (this.keys.D.isDown || this.cursors.right.isDown) this.player.x += spd * (delta / 1000);
                if (this.keys.W.isDown || this.cursors.up.isDown) this.player.y -= spd * (delta / 1000);
                if (this.keys.S.isDown || this.cursors.down.isDown) this.player.y += spd * (delta / 1000);

                this.player.x = Phaser.Math.Clamp(this.player.x, 40, 680);
                this.player.y = Phaser.Math.Clamp(this.player.y, 200, 1100);
                this.radiusCircle.setPosition(this.player.x, this.player.y);

                this.hookCooldown -= delta / 1000;
                if (this.hookCooldown <= 0) {
                    this.mobs.getChildren().forEach((m) => {
                        const dist = Phaser.Math.Distance.Between(this.player.x, this.player.y, m.x, m.y);
                        if (dist < this.radius + 25) this.fireHook(m);
                    });
                }

                this.mobs.getChildren().forEach((m) => {
                    const dist = Phaser.Math.Distance.Between(this.player.x, this.player.y, m.x, m.y);
                    if (dist < 40) this.playerHP -= 0.5 * (this.floor / 5);
                });

                if (this.playerHP <= 0) this.gameOver();

                this.updateUI();
                this.updateRadius();
            }

            updateUI() {
                const rank = this.telegram.getPlayerRank();
                this.ui.setText(
                    `Этаж: ${this.floor} | HP: ${Math.ceil(this.playerHP)}\n` +
                    `Сила:${Math.floor(this.stats.strength)} Ловк:${Math.floor(this.stats.agility)}\n` +
                    `Скор:${Math.floor(this.stats.speed)} Живуч:${Math.floor(this.stats.vitality)}\n` +
                    `Убиств: ${this.currentRunKills} | Осколки: ${Math.floor(this.progression.legacyShards)}\n` +
                    `Рейтинг: ${rank.percentile}%`
                );

                this.hpBar.clear();
                this.hpBar.fillStyle(0xff0000, 1);
                const maxHP = 100 + this.stats.vitality * 5;
                this.hpBar.fillRect(20, 140, (this.playerHP / maxHP) * 200, 20);
            }

            fireHook(target) {
                const baseCooldown = Math.max(0.55, 4 - this.stats.speed * 0.035 - this.floor * 0.008);
                this.hookCooldown = baseCooldown;

                const isCrit = Math.random() < this.critChance + this.stats.agility * 0.01;

                const chain = this.add.graphics();
                chain.lineStyle(7, 0xffaa00, 1);
                chain.lineBetween(this.player.x, this.player.y, target.x, target.y);
                this.tweens.add({
                    targets: chain,
                    alpha: 0,
                    duration: 180,
                    onComplete: () => chain.destroy(),
                });

                this.tweens.add({
                    targets: target,
                    x: this.player.x,
                    y: this.player.y,
                    duration: 200,
                    onComplete: () => {
                        const type = target.getData('type');
                        const baseDamage = 10 + this.stats.strength * 2;
                        let damage = baseDamage;

                        if (isCrit) {
                            damage *= 1.5;
                            this.effects.triggerCritFlash();
                            this.effects.playCritSound(2);
                        } else {
                            this.effects.playCritSound(1);
                        }

                        const hp = target.getData('hp') - damage;
                        target.setData('hp', hp);

                        if (hp <= 0) {
                            const reward = type.amt + this.floor * 0.3;
                            this.stats[type.give] += reward;
                            this.effects.spawnBloodParticles(target.x, target.y, 8);
                            this.effects.spawnExpParticles(target.x, target.y, reward, type.give);
                            target.destroy();
                            this.currentRunKills++;

                            if (this.bossSystem.isBossFloor(this.floor) && this.mobs.getChildren().length === 0) {
                                this.floor++;
                                this.updateSkin();
                                this.updateBiomeBackground();
                                this.playerHP += 30;
                                this.effects.floorTransitionEffect();
                            }
                        }
                    },
                });
            }

            gameOver() {
                const reward = Math.floor(this.floor * 7 + 15);
                this.progression.legacyShards += reward;
                this.saveGame();
                this.telegram.triggerHaptic('heavy');
                alert(`💀 СМЕРТЬ НА ЭТАЖЕ ${this.floor}!\n\nУбиств: ${this.currentRunKills}\nОсколков: +${reward}\nВсего: ${Math.floor(this.progression.legacyShards)}`);
                this.scene.restart();
            }

            async loadGame() {
                let saved = localStorage.getItem('hookButcherSave');
                if (saved) {
                    const data = JSON.parse(saved);
                    this.floor = data.floor || 1;
                    this.stats = data.stats || this.stats;
                    this.playerHP = data.hp || this.playerHP;
                    this.progression.load(data.progression);
                }
                this.telegram.updateLeaderboard({floor: this.floor, legacyShards: this.progression.legacyShards});
            }

            saveGame() {
                const data = {
                    floor: this.floor,
                    stats: this.stats,
                    hp: this.playerHP,
                    progression: this.progression.save(),
                    lastTime: Date.now(),
                };
                localStorage.setItem('hookButcherSave', JSON.stringify(data));
                if (window.Telegram?.CloudStorage?.setItem) {
                    window.Telegram.CloudStorage.setItem('save', JSON.stringify(data));
                }
                this.telegram.updateLeaderboard({floor: this.floor, legacyShards: this.progression.legacyShards});
            }
        }

        // === ИНИЦИАЛИЗАЦИЯ PHASER ===
        const config = {
            type: Phaser.AUTO,
            width: 720,
            height: 1280,
            parent: 'game',
            physics: {default: 'arcade', arcade: {debug: false, gravity: {y: 0}}},
            scene: [GameScene],
            backgroundColor: '#1a0000',
            scale: {mode: Phaser.Scale.FIT, autoCenter: Phaser.Scale.CENTER_BOTH, fullscreenTarget: 'game', expandParent: true},
            input: {touch: true, mouse: true},
            render: {pixelArt: false, antialias: true},
        };

        const game = new Phaser.Game(config);
        console.log('🎮 Hook Butcher: Telegram Edition v2.0 loaded');
    </script>
</body>
</html>
